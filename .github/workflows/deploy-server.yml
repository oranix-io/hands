name: Deploy Quiver Server

on:
  workflow_dispatch:
    inputs:
      containers_rollout:
        description: "Cloudflare Containers rollout strategy. Use none when only Worker/API/admin assets changed."
        required: true
        type: choice
        options:
          - none
          - immediate
          - gradual
        default: none
      run_checks:
        description: "Run Worker tests/build and admin build before deploy."
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "server-v*"

permissions:
  contents: read

concurrency:
  group: quiver-server-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Worker types
        working-directory: worker
        run: pnpm exec wrangler types

      - name: Run checks
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_checks }}
        run: |
          pnpm --filter @oranix/quiver-worker test
          pnpm --filter @oranix/quiver-worker build
          pnpm --filter @oranix/quiver-cli build
          pnpm --filter @oranix/quiver-admin build

      - name: Resolve rollout strategy
        id: rollout
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=none" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.containers_rollout }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply D1 migrations
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec wrangler d1 migrations apply quiver-db --remote

      - name: Deploy Worker and admin assets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Missing GitHub secret CLOUDFLARE_API_TOKEN." >&2
            exit 1
          fi
          pnpm exec wrangler deploy --containers-rollout "${{ steps.rollout.outputs.value }}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Quiver server deploy"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Ref | \`${GITHUB_REF_NAME}\` |"
            echo "| SHA | \`${GITHUB_SHA}\` |"
            echo "| Containers rollout | \`${{ steps.rollout.outputs.value }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
