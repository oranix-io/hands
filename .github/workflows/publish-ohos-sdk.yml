name: Publish OHOS SDK

on:
  pull_request:
    paths:
      - ".github/workflows/publish-ohos-sdk.yml"
      - "clients/ohos/**"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish. Must match clients/ohos/hands/oh-package.json5."
        required: true
        default: "0.1.0"
      dry_run:
        description: "Build and prepublish only; skip ohpm publish."
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "ohos-sdk-v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bytemain/harmony-next-pipeline-docker/harmonyos-ci-image:latest
    env:
      OHOS_TOOL_HOME: /opt/harmonyos-tools/command-line-tools
      DEVECO_SDK_HOME: /opt/harmonyos-tools/command-line-tools/sdk
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup HarmonyOS command-line tools
        shell: bash
        run: |
          set -euo pipefail
          for required_path in \
            "$OHOS_TOOL_HOME/sdk" \
            "$OHOS_TOOL_HOME/bin" \
            "$OHOS_TOOL_HOME/sdk/default/openharmony/toolchains"
          do
            if [[ ! -d "$required_path" ]]; then
              echo "Missing HarmonyOS tool path: $required_path" >&2
              exit 1
            fi
            echo "$required_path" >> "$GITHUB_PATH"
          done

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -e "const fs=require('fs'); const text=fs.readFileSync('clients/ohos/hands/oh-package.json5','utf8'); const m=text.match(/\"version\"\\s*:\\s*\"([^\"]+)\"/); if (!m) process.exit(1); process.stdout.write(m[1]);")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            requested="${GITHUB_REF_NAME#ohos-sdk-v}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            requested="${{ inputs.version }}"
          else
            requested="${package_version}"
          fi
          if [[ "${requested}" != "${package_version}" ]]; then
            echo "Requested version ${requested} does not match clients/ohos/hands/oh-package.json5 ${package_version}" >&2
            exit 1
          fi
          echo "value=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Print tool versions
        shell: bash
        run: |
          set -euo pipefail
          command -v node
          command -v ohpm
          command -v hvigorw
          ohpm --version
          hvigorw --version

      - name: Build HAR
        working-directory: clients/ohos
        shell: bash
        run: |
          set -euo pipefail
          ohpm install --all
          hvigorw --sync --analyze=normal --parallel
          hvigorw clean --analyze=normal
          hvigorw --mode module -p module=hands@default assembleHar --analyze=normal --parallel

      - name: Prepublish check
        working-directory: clients/ohos
        run: ohpm prepublish hands/build/default/outputs/default/hands.har --log_level info

      - uses: actions/upload-artifact@v4
        with:
          name: botiverse-hands-ohos-${{ steps.version.outputs.value }}.har
          path: clients/ohos/hands/build/default/outputs/default/hands.har
          if-no-files-found: error

      - name: Publish to OHPM
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || !inputs.dry_run) }}
        working-directory: clients/ohos
        env:
          OHPM_PUBLISH_ID: ${{ secrets.OHPM_PUBLISH_ID }}
          OHPM_PRIVATE_KEY_B64: ${{ secrets.OHPM_PRIVATE_KEY_B64 }}
          OHPM_KEY_PASSPHRASE: ${{ secrets.OHPM_KEY_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${OHPM_PUBLISH_ID:-}" || -z "${OHPM_PRIVATE_KEY_B64:-}" || -z "${OHPM_KEY_PASSPHRASE:-}" ]]; then
            echo "Missing one of OHPM_PUBLISH_ID, OHPM_PRIVATE_KEY_B64, OHPM_KEY_PASSPHRASE." >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/ohpm_publish_key"
          crypto_path="$RUNNER_TEMP/ohpm_crypto"
          printf '%s' "$OHPM_PRIVATE_KEY_B64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"

          ohpm config set publish_registry https://ohpm.openharmony.cn/ohpm
          ohpm config set publish_id "$OHPM_PUBLISH_ID"
          ohpm config set key_path "$key_path"
          ohpm config set crypto_path "$crypto_path"

          ohpm_bin="$(command -v ohpm)"
          crypto_module="$(
            find \
              "$(dirname "$(dirname "$ohpm_bin")")" \
              "$(dirname "$(dirname "$(dirname "$ohpm_bin")")")" \
              "${OHOS_TOOL_HOME:-}" \
              -path '*/lib/core/config-encrypt/crypto/index.js' \
              -print -quit 2>/dev/null || true
          )"
          if [[ -z "$crypto_module" ]]; then
            echo "Unable to locate OHPM crypto module near $ohpm_bin" >&2
            exit 1
          fi

          encrypted_passphrase="$(OHPM_CRYPTO_MODULE="$crypto_module" CRYPTO_PATH="$crypto_path" node <<'NODE'
          const fs = require('node:fs');
          const cryptoPath = process.env.CRYPTO_PATH;
          const cryptoModule = process.env.OHPM_CRYPTO_MODULE;
          const passphrase = process.env.OHPM_KEY_PASSPHRASE;
          const mod = require(cryptoModule);

          (async () => {
            if (!fs.existsSync(cryptoPath) || fs.readdirSync(cryptoPath).length === 0) {
              await mod.createCrypto(cryptoPath);
            }
            const crypto = mod.loadCustomCrypto(cryptoPath);
            if (!crypto) {
              throw new Error(`Failed to load ohpm crypto component at ${cryptoPath}`);
            }
            process.stdout.write(crypto.encrypt(passphrase));
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
          )"
          ohpm config set key_passphrase "$encrypted_passphrase"
          trap 'ohpm config delete key_passphrase >/dev/null 2>&1 || true' EXIT

          ohpm publish hands/build/default/outputs/default/hands.har --log_level info

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### OHOS SDK"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Package | \`@botiverse/hands\` |"
            echo "| Version | \`${{ steps.version.outputs.value }}\` |"
            echo "| Dry run | \`${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
