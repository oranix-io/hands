name: Deploy Hands Server

on:
  workflow_dispatch:
    inputs:
      containers_rollout:
        description: "Cloudflare Containers rollout strategy. Use none when only Worker/API/admin assets changed."
        required: true
        type: choice
        options:
          - none
          - immediate
          - gradual
        default: none
      run_checks:
        description: "Run Worker tests/build, CLI build, and admin build before deploy."
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: hands-server-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_BOTIVERSE_ACCOUNT_ID }}
      HANDS_WORKER_NAME: ${{ vars.HANDS_WORKER_NAME }}
      HANDS_D1_DATABASE_NAME: ${{ vars.HANDS_D1_DATABASE_NAME }}
      HANDS_D1_DATABASE_ID: ${{ vars.HANDS_D1_DATABASE_ID }}
      HANDS_R2_BUCKET_NAME: ${{ vars.HANDS_R2_BUCKET_NAME }}
      HANDS_BUSINESS_DOMAIN: ${{ vars.HANDS_BUSINESS_DOMAIN }}
      HANDS_DASHBOARD_DOMAIN: ${{ vars.HANDS_DASHBOARD_DOMAIN }}
      HANDS_CORS_ALLOWED_ORIGINS: ${{ vars.HANDS_CORS_ALLOWED_ORIGINS }}
      HANDS_RAFT_ORIGIN: ${{ vars.HANDS_RAFT_ORIGIN }}
      HANDS_RAFT_API_ORIGIN: ${{ vars.HANDS_RAFT_API_ORIGIN }}
      HANDS_RAFT_CLIENT_ID: ${{ vars.HANDS_RAFT_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Render production Wrangler config
        working-directory: worker
        run: node scripts/render-production-config.mjs --output wrangler.hands.generated.jsonc

      - name: Generate Worker types
        working-directory: worker
        # Generate the business worker's Env from the hands config. The default
        # wrangler.jsonc is now the legacy proxy shim (shim-only vars), so
        # without --config the generated Env would lack DB/APK_BUCKET/ASSETS and
        # the src/index.ts typecheck below would fail.
        run: pnpm exec wrangler types --config wrangler.hands.generated.jsonc

      - name: Run checks
        if: ${{ inputs.run_checks }}
        run: |
          pnpm --filter @botiverse/hands-worker test
          pnpm --filter @botiverse/hands-worker build
          # "..." builds workspace deps first (hands-cli depends on hands-node).
          pnpm --filter @botiverse/hands-cli... build
          pnpm --filter @botiverse/hands-admin build

      - name: Build deploy assets
        if: ${{ !inputs.run_checks }}
        run: pnpm --filter @botiverse/hands-admin build

      - name: Bootstrap Hands Cloudflare resources
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOTIVERSE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Missing GitHub secret CLOUDFLARE_BOTIVERSE_API_TOKEN." >&2
            exit 1
          fi

          pnpm exec wrangler d1 info "${HANDS_D1_DATABASE_NAME}" --config wrangler.hands.generated.jsonc >/dev/null

          if ! pnpm exec wrangler r2 bucket info "${HANDS_R2_BUCKET_NAME}" >/dev/null 2>&1; then
            pnpm exec wrangler r2 bucket create "${HANDS_R2_BUCKET_NAME}"
          fi

      - name: Apply Hands D1 migrations
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOTIVERSE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec wrangler d1 migrations apply "${HANDS_D1_DATABASE_NAME}" --remote --config wrangler.hands.generated.jsonc

      # Deploy the Worker BEFORE putting secrets. `wrangler secret put` refuses
      # when the latest uploaded Worker version isn't deployed (e.g. a stray
      # `wrangler versions upload` left a pending version); deploying first makes
      # latest == deployed so the secret puts succeed. Secrets already exist on
      # the running Worker, so this initial deploy uses the current values and
      # each subsequent `secret put` re-deploys idempotently.
      - name: Deploy Hands Worker and admin assets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOTIVERSE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec wrangler deploy \
            --config wrangler.hands.generated.jsonc \
            --containers-rollout "${{ inputs.containers_rollout }}"

      - name: Configure Hands Worker secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOTIVERSE_API_TOKEN }}
          SIGNED_URL_SECRET: ${{ secrets.HANDS_SIGNED_URL_SECRET }}
          RAFT_CLIENT_SECRET: ${{ secrets.HANDS_RAFT_CLIENT_SECRET }}
          ASC_CRED_ENC_KEY: ${{ secrets.HANDS_ASC_CRED_ENC_KEY }}
          AGC_CRED_ENC_KEY: ${{ secrets.HANDS_AGC_CRED_ENC_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_BOTIVERSE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SIGNED_URL_SECRET:-}" ]]; then
            echo "Missing GitHub secret HANDS_SIGNED_URL_SECRET." >&2
            exit 1
          fi
          if [[ -z "${RAFT_CLIENT_SECRET:-}" ]]; then
            echo "Missing GitHub secret HANDS_RAFT_CLIENT_SECRET." >&2
            exit 1
          fi
          if [[ -z "${ASC_CRED_ENC_KEY:-}" ]]; then
            echo "Missing GitHub secret HANDS_ASC_CRED_ENC_KEY." >&2
            exit 1
          fi
          if [[ -z "${AGC_CRED_ENC_KEY:-}" ]]; then
            echo "Missing GitHub secret HANDS_AGC_CRED_ENC_KEY." >&2
            exit 1
          fi
          if [[ -z "${R2_ACCOUNT_ID:-}" ]]; then
            echo "Missing GitHub secret CLOUDFLARE_BOTIVERSE_ACCOUNT_ID." >&2
            exit 1
          fi
          config=wrangler.hands.generated.jsonc
          printf '%s' "${SIGNED_URL_SECRET}" | pnpm exec wrangler secret put SIGNED_URL_SECRET --config "${config}"
          printf '%s' "${RAFT_CLIENT_SECRET}" | pnpm exec wrangler secret put RAFT_CLIENT_SECRET --config "${config}"
          printf '%s' "${ASC_CRED_ENC_KEY}" | pnpm exec wrangler secret put ASC_CRED_ENC_KEY --config "${config}"
          printf '%s' "${AGC_CRED_ENC_KEY}" | pnpm exec wrangler secret put AGC_CRED_ENC_KEY --config "${config}"
          printf '%s' "${R2_ACCOUNT_ID}" | pnpm exec wrangler secret put R2_ACCOUNT_ID --config "${config}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Hands server deploy"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Ref | \`${GITHUB_REF_NAME}\` |"
            echo "| SHA | \`${GITHUB_SHA}\` |"
            echo "| Containers rollout | \`${{ inputs.containers_rollout }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
